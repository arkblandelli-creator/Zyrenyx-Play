<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1DB954">
    <title>Zyrenyx Music · Spotify Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: #ffffff;
        }

        /* Banner demo */
        .demo-banner {
            background: #ffcc00;
            color: #000000;
            text-align: center;
            padding: 8px;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 1px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .main-app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-top: 36px;
            background: #121212;
        }

        /* Header */
        .app-header {
            background: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #282828;
        }
        .app-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1DB954, #1ed760);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .demo-badge {
            background: rgba(255,204,0,0.2);
            color: #ffcc00;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            border: 0.5px solid #ffcc00;
        }

        .player-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 30px;
        }

        /* Cover Art */
        .cover-section {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }
        .cover-art {
            width: 260px;
            height: 260px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }
        .cover-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Info Lagu */
        .song-info {
            text-align: center;
            margin-bottom: 28px;
        }
        .song-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .song-artist {
            font-size: 0.9rem;
            color: #b3b3b3;
        }

        /* ========== TOMBOL PLAY/PAUSE MIRIP SPOTIFY (CSS MURNI) ========== */
        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            margin-bottom: 28px;
        }
        .ctrl-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .ctrl-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.02);
        }

        /* Tombol Previous/Next - menggunakan border segitiga */
        .prev-icon, .next-icon {
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
        }
        .prev-icon {
            border-right: 12px solid #b3b3b3;
        }
        .next-icon {
            border-left: 12px solid #b3b3b3;
        }
        .ctrl-btn:hover .prev-icon { border-right-color: white; }
        .ctrl-btn:hover .next-icon { border-left-color: white; }

        /* TOMBOL PLAY SPOTIFY (lingkaran hijau + segitiga putih) */
        .play-spotify {
            background: #1DB954;
            width: 64px;
            height: 64px;
        }
        .play-spotify:hover {
            background: #1ed760;
            transform: scale(1.02);
        }

        /* Segitiga Play (CSS border) */
        .play-triangle {
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 16px solid #000000;
            margin-left: 4px;
        }

        /* Tombol Pause (dua bar vertikal) */
        .pause-bars {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
        }
        .pause-bar {
            width: 5px;
            height: 18px;
            background-color: #000000;
            border-radius: 2px;
        }

        /* Progress Bar */
        .progress-section {
            max-width: 450px;
            margin: 0 auto 28px;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #535353;
            border-radius: 4px;
            cursor: pointer;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #1DB954;
            border-radius: 4px;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.7rem;
            color: #b3b3b3;
        }

        /* Playlist */
        .playlist-section {
            max-width: 450px;
            margin: 0 auto;
        }
        .playlist-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #b3b3b3;
            margin-bottom: 12px;
            padding-left: 6px;
        }
        .playlist-items {
            max-height: 200px;
            overflow-y: auto;
        }
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin: 2px 0;
        }
        .playlist-item:hover {
            background: #282828;
        }
        .playlist-item.active {
            background: #282828;
            border-left: 3px solid #1DB954;
        }
        .item-cover {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .item-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .item-info {
            flex: 1;
        }
        .item-title {
            font-weight: 500;
            font-size: 0.85rem;
        }
        .item-artist {
            font-size: 0.7rem;
            color: #b3b3b3;
            margin-top: 2px;
        }
        .playlist-items::-webkit-scrollbar {
            width: 4px;
        }
        .playlist-items::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        .playlist-items::-webkit-scrollbar-thumb {
            background: #1DB954;
            border-radius: 4px;
        }

        @media (max-width: 550px) {
            .cover-art { width: 200px; height: 200px; }
            .song-title { font-size: 1.2rem; }
            .play-spotify { width: 56px; height: 56px; }
            .play-triangle { border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 13px solid #000000; }
            .pause-bar { width: 4px; height: 14px; gap: 4px; }
        }
    </style>
</head>
<body>

<div class="demo-banner">
    ⚠️ INI HANYA WEB DEMO ⚠️
</div>

<div class="main-app">
    <div class="app-header">
        <h2>ZYRENYX MUSIC</h2>
        <div class="demo-badge">DEMO VERSION</div>
    </div>

    <div class="player-container">
        <div class="cover-section">
            <div class="cover-art">
                <img id="coverImg" src="" alt="cover">
            </div>
        </div>

        <div class="song-info">
            <div class="song-title" id="songTitle">Love Me Not</div>
            <div class="song-artist" id="songArtist">Ravyn Lenae</div>
        </div>

        <!-- Kontrol: tombol Play/Pause mirip Spotify (CSS murni) -->
        <div class="player-controls">
            <button class="ctrl-btn" id="prevBtn">
                <div class="prev-icon"></div>
            </button>
            <button class="ctrl-btn play-spotify" id="playBtn">
                <div id="playPauseIcon"></div>
            </button>
            <button class="ctrl-btn" id="nextBtn">
                <div class="next-icon"></div>
            </button>
        </div>

        <div class="progress-section">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="durationTime">0:00</span>
            </div>
        </div>

        <div class="playlist-section">
            <div class="playlist-label">YOUR PLAYLIST</div>
            <div class="playlist-items" id="playlistContainer"></div>
        </div>
    </div>
</div>

<script>
    // ========== DATA LAGU ==========
    const songs = [
        { id:0, title:"Love Me Not", artist:"Ravyn Lenae", cover:"https://c.termai.cc/i174/QITh.jpg", duration:"3:39", url:"https://c.termai.cc/a119/gIbkU.mp3" },
        { id:1, title:"Cinnamon Girl", artist:"Lana Del Rey", cover:"https://c.termai.cc/i192/XZGSOHh.jpg", duration:"4:57", url:"https://put.icu/s/2ih22yv9.mp3" },
        { id:2, title:"Windflower", artist:"Bilie Eilish", cover:"https://c.termai.cc/i103/cHByS.jpg", duration:"4:22", url:"https://c.termai.cc/a128/aFe5p1H.mp3" }
    ];

    let currentIndex = 0;
    let audio = new Audio();
    let isPlaying = false;

    // DOM elements
    const coverImg = document.getElementById('coverImg');
    const songTitle = document.getElementById('songTitle');
    const songArtist = document.getElementById('songArtist');
    const playBtn = document.getElementById('playBtn');
    const playPauseIcon = document.getElementById('playPauseIcon');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('durationTime');
    const playlistContainer = document.getElementById('playlistContainer');

    // Update ikon Play/Pause (CSS murni)
    function updatePlayPauseIcon() {
        if (isPlaying) {
            // Tampilkan ikon Pause (dua bar vertikal)
            playPauseIcon.innerHTML = '<div class="pause-bars"><div class="pause-bar"></div><div class="pause-bar"></div></div>';
        } else {
            // Tampilkan ikon Play (segitiga)
            playPauseIcon.innerHTML = '<div class="play-triangle"></div>';
        }
    }

    function loadSong(index) {
        const s = songs[index];
        songTitle.innerText = s.title;
        songArtist.innerText = s.artist;
        coverImg.src = s.cover;
        coverImg.onerror = () => coverImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231DB954'/%3E%3Ctext x='50' y='50' fill='white' text-anchor='middle' dominant-baseline='middle'%3E♪%3C/text%3E%3C/svg%3E";
        audio.src = s.url;
        audio.load();
        updateActivePlaylist();

        if('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: s.title,
                artist: s.artist,
                artwork: [{ src: s.cover, sizes: '512x512' }]
            });
            navigator.mediaSession.setActionHandler('play', () => play());
            navigator.mediaSession.setActionHandler('pause', () => pause());
            navigator.mediaSession.setActionHandler('previoustrack', () => prev());
            navigator.mediaSession.setActionHandler('nexttrack', () => next());
        }
    }

    function play() {
        audio.play().then(() => {
            isPlaying = true;
            updatePlayPauseIcon();
        }).catch(e => console.log(e));
    }

    function pause() {
        audio.pause();
        isPlaying = false;
        updatePlayPauseIcon();
    }

    function togglePlay() {
        isPlaying ? pause() : play();
    }

    function next() {
        currentIndex = (currentIndex + 1) % songs.length;
        loadSong(currentIndex);
        if(isPlaying) play();
    }

    function prev() {
        currentIndex = (currentIndex - 1 + songs.length) % songs.length;
        loadSong(currentIndex);
        if(isPlaying) play();
    }

    function updateProgress() {
        if(audio.duration) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeSpan.innerText = formatTime(audio.currentTime);
            durationSpan.innerText = formatTime(audio.duration);
        }
    }

    function formatTime(sec) {
        if(isNaN(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function seek(e) {
        const rect = progressBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        audio.currentTime = percent * audio.duration;
    }

    function renderPlaylist() {
        playlistContainer.innerHTML = '';
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `playlist-item ${i === currentIndex ? 'active' : ''}`;
            div.innerHTML = `
                <div class="item-cover"><img src="${s.cover}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'%231DB954\'/%3E%3Ctext x=\'50\' y=\'50\' fill=\'white\' text-anchor=\'middle\' dominant-baseline=\'middle\'%3E♪%3C/text%3E%3C/svg%3E'"></div>
                <div class="item-info">
                    <div class="item-title">${s.title}</div>
                    <div class="item-artist">${s.artist}</div>
                </div>
                <div class="item-duration">${s.duration}</div>
            `;
            div.onclick = () => {
                currentIndex = i;
                loadSong(currentIndex);
                if(isPlaying) play();
            };
            playlistContainer.appendChild(div);
        });
    }

    function updateActivePlaylist() {
        document.querySelectorAll('.playlist-item').forEach((item, i) => {
            if(i === currentIndex) item.classList.add('active');
            else item.classList.remove('active');
        });
    }

    // Event listeners
    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);
    progressBar.addEventListener('click', seek);
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', next);
    audio.volume = 0.7;

    renderPlaylist();
    loadSong(0);
    updatePlayPauseIcon();
</script>
</body>
</html>
